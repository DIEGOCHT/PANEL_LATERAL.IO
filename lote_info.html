<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Información del Lote</title>

<style>

*{
    box-sizing:border-box;
}

html,body{
    margin:0;
    padding:0;
    background:transparent;
    font-family:Arial, Helvetica, sans-serif;
    overflow:hidden;
}

#panel{

    position:fixed;

    top:124px;
    left:0px;

    width:420px;
    max-width:calc(100vw - 20px);

    background:#fff;

    border-radius:22px;

    overflow:hidden;

    box-shadow:0 12px 40px rgba(0,0,0,.25);

    transform:translateX(-120%);

    transition:.4s ease;

}

#panel.visible{

    transform:translateX(0);

}

#imagenContainer{

    position:relative;

    height:240px;

    background:#f3f3f3;

}

#imagen{

    width:100%;
    height:100%;

    object-fit:cover;

    display:block;

}

#cerrar{

    position:absolute;

    top:15px;
    right:15px;

    width:52px;
    height:52px;

    border:none;

    border-radius:50%;

    background:white;

    cursor:pointer;

    font-size:30px;

    box-shadow:0 2px 10px rgba(0,0,0,.25);

}

#contenido{

    padding:24px;

}

#cabecera{

    display:flex;

    justify-content:space-between;

    align-items:center;

    gap:10px;

}

#lote{

    margin:0;

    font-size:22px;

    color:#222;

}

#estado{

    padding:8px 16px;

    border-radius:30px;

    color:white;

    font-weight:bold;

    font-size:14px;

}

.estado-libre{

    background:#16a34a;

}

.estado-reservado{

    background:#eab308;

}

.estado-vendido{

    background:#dc2626;

}

.fila{

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:14px 0;

    border-bottom:1px solid #e5e5e5;

}

.label{

    color:#666;

    font-size:15px;

}

.valor{

    color:#222;

    font-weight:600;

    text-align:right;

}

#consultarPrecio{

    width:100%;

    border:none;

    background:#3f4d5d;

    color:white;

    font-size:18px;

    font-weight:bold;

    padding:18px;

    border-radius:35px;

    cursor:pointer;

    margin-top:20px;

}

#modalConsulta{

    position:fixed;

    inset:0;

    background:rgba(0,0,0,.45);

    display:none;

    justify-content:center;

    align-items:center;

    z-index:9999;

}

#ventanaConsulta{

    width:650px;

    max-width:95vw;

    background:white;

    border-radius:20px;

    padding:35px;

    position:relative;

    box-shadow:0 10px 30px rgba(0,0,0,.25);

}

#cerrarModal{

    position:absolute;

    right:20px;

    top:20px;

    width:50px;

    height:50px;

    border:none;

    border-radius:50%;

    background:#f2f2f2;

    cursor:pointer;

    font-size:34px;

}

#datosLote{

    color:#777;

    margin-bottom:20px;

}

#ventanaConsulta input,
#ventanaConsulta textarea{

    width:100%;

    padding:18px;

    margin-top:15px;

    border:1px solid #ddd;

    border-radius:30px;

    font-size:16px;

}

#ventanaConsulta textarea{

    height:120px;

    resize:none;

}

#enviarConsulta{

    width:100%;

    margin-top:25px;

    padding:18px;

    border:none;

    border-radius:35px;

    background:#3f4d5d;

    color:white;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

}

@media(max-width:600px){

    #panel{

        width:calc(100vw - 20px);

    }

    #imagenContainer{

        height:180px;

    }

}

</style>
</head>

<body>

<div id="panel">

    <div id="imagenContainer">

        <img id="imagen" src="" alt="Imagen del lote">

        <button id="cerrar">×</button>

    </div>

    <div id="contenido">

        <div id="cabecera">

            <h2 id="lote">Cargando...</h2>

            <span id="estado">...</span>

        </div>

        <div class="fila">

            <span class="label">Medidas</span>

            <span class="valor" id="medidas"></span>

        </div>

        <div class="fila">

            <span class="label">Área</span>

            <span class="valor" id="area"></span>

        </div>

        <div class="fila">

            <span class="label">Ubicación</span>

            <span class="valor" id="ubicacion"></span>

        </div>

<button id="consultarPrecio">

    ✉ Consultar precio

</button>
    </div>

</div>
<div id="modalConsulta">

    <div id="ventanaConsulta">

        <button id="cerrarModal">×</button>

        <h2>Consultar precio</h2>

        <p id="datosLote"></p>

        <input
            type="text"
            id="nombre"
            placeholder="Nombre">

        <input
            type="email"
            id="email"
            placeholder="Email">

        <input
            type="tel"
            id="telefono"
            placeholder="Teléfono">

        <textarea
            id="mensaje"
            placeholder="Mensaje"></textarea>

        <button id="enviarConsulta">

            Enviar

        </button>

    </div>

</div>
<script>

const panel = document.getElementById("panel");

const loteEl = document.getElementById("lote");
const estadoEl = document.getElementById("estado");
const medidasEl = document.getElementById("medidas");
const areaEl = document.getElementById("area");
const ubicacionEl = document.getElementById("ubicacion");
const imagenEl = document.getElementById("imagen");

document.getElementById("cerrar")
.addEventListener("click",()=>{

    panel.classList.remove("visible");

});

function obtenerParametro(nombre){

    const url = new URL(window.location.href);

    return url.searchParams.get(nombre);

}

function cargarLote(){

    const script = document.createElement("script");

    script.src =
    "https://script.google.com/macros/s/AKfycbxBOEvdiRzdowvAkexEdUZrEgKxqi9lJCSy6bnqLMVgdvYQv_PMGYKv2-U71sWzauR8/exec?callback=procesarDatos";

    document.body.appendChild(script);

}

function procesarDatos(datos){

    const loteBuscado =
    obtenerParametro("lote");

    if(!loteBuscado){

        loteEl.textContent =
        "No se indicó lote";

        return;

    }

    const lote =
    datos.find(item =>
        item.Lote === loteBuscado
    );

    if(!lote){

        loteEl.textContent =
        "Lote no encontrado";

        return;

    }

    loteEl.textContent =
    lote.Lote;

    medidasEl.textContent =
    lote.Medidas || "-";

    areaEl.textContent =
    lote.Area || "-";

    ubicacionEl.textContent =
    lote.Ubicacion || "-";

    estadoEl.textContent =
    lote.Estado || "";

    estadoEl.className = "";

    const estado =
    (lote.Estado || "")
    .toUpperCase();

    if(estado === "LIBRE"){

        estadoEl.classList
        .add("estado-libre");

    }
    else if(
        estado === "RESERVADO"
    ){

        estadoEl.classList
        .add("estado-reservado");

    }
    else{

        estadoEl.classList
        .add("estado-vendido");

    }

    if(
        lote.Imagen &&
        lote.Imagen.trim() !== ""
    ){

        imagenEl.src =
        lote.Imagen;

    }
    else{

        imagenEl.src =
        "thumbnail.png";

    }

    setTimeout(()=>{

        panel.classList
        .add("visible");

    },100);

}

document
.getElementById("consultarPrecio")
.addEventListener("click",()=>{

    document
    .getElementById("modalConsulta")
    .style.display="flex";

    document
    .getElementById("datosLote")
    .textContent =
    loteEl.textContent +
    " - " +
    ubicacionEl.textContent;

});

document
.getElementById("cerrarModal")
.addEventListener("click",()=>{

    document
    .getElementById("modalConsulta")
    .style.display="none";

});

document
.getElementById("enviarConsulta")
.addEventListener("click",()=>{

    const nombre =
    document.getElementById("nombre").value;

    const email =
    document.getElementById("email").value;

    const telefono =
    document.getElementById("telefono").value;

    const mensaje =
    document.getElementById("mensaje").value;

    const texto =

`Hola, deseo consultar el precio del siguiente lote:

Lote: ${loteEl.textContent}
Ubicación: ${ubicacionEl.textContent}
Estado: ${estadoEl.textContent}
Área: ${areaEl.textContent}
Medidas: ${medidasEl.textContent}

Nombre: ${nombre}
Email: ${email}
Teléfono: ${telefono}

Mensaje:
${mensaje}`;

    const whatsapp =
    "https://wa.me/51989567212?text=" +
    encodeURIComponent(texto);

    window.open(
        whatsapp,
        "_blank"
    );

});

cargarLote();

</script>

</body>
</html>
