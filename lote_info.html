<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Información del Lote</title>

<style>

*{
    box-sizing:border-box;
}

html,body{
    margin:0;
    padding:0;
    background:transparent;
    font-family:Arial, Helvetica, sans-serif;
    overflow:hidden;
}

#panel{

    position:fixed;

    top:10px;
    left:10px;

    width:420px;
    max-width:calc(100vw - 20px);

    background:#fff;

    border-radius:22px;

    overflow:hidden;

    box-shadow:0 12px 40px rgba(0,0,0,.25);

    transform:translateX(-120%);

    transition:.4s ease;

}

#panel.visible{

    transform:translateX(0);

}

#imagenContainer{

    position:relative;

    height:240px;

    background:#f3f3f3;

}

#imagen{

    width:100%;
    height:100%;

    object-fit:cover;

    display:block;

}

#cerrar{

    position:absolute;

    top:15px;
    right:15px;

    width:52px;
    height:52px;

    border:none;

    border-radius:50%;

    background:white;

    cursor:pointer;

    font-size:30px;

    box-shadow:0 2px 10px rgba(0,0,0,.25);

}

#contenido{

    padding:24px;

}

#cabecera{

    display:flex;

    justify-content:space-between;

    align-items:center;

    gap:10px;

}

#lote{

    margin:0;

    font-size:22px;

    color:#222;

}

#estado{

    padding:8px 16px;

    border-radius:30px;

    color:white;

    font-weight:bold;

    font-size:14px;

}

.estado-libre{

    background:#16a34a;

}

.estado-reservado{

    background:#eab308;

}

.estado-vendido{

    background:#dc2626;

}

.fila{

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:14px 0;

    border-bottom:1px solid #e5e5e5;

}

.label{

    color:#666;

    font-size:15px;

}

.valor{

    color:#222;

    font-weight:600;

    text-align:right;

}

@media(max-width:600px){

    #panel{

        width:calc(100vw - 20px);

    }

    #imagenContainer{

        height:180px;

    }

}

</style>
</head>

<body>

<div id="panel">

    <div id="imagenContainer">

        <img id="imagen" src="" alt="Imagen del lote">

        <button id="cerrar">×</button>

    </div>

    <div id="contenido">

        <div id="cabecera">

            <h2 id="lote">Cargando...</h2>

            <span id="estado">...</span>

        </div>

        <div class="fila">

            <span class="label">Medidas</span>

            <span class="valor" id="medidas"></span>

        </div>

        <div class="fila">

            <span class="label">Área</span>

            <span class="valor" id="area"></span>

        </div>

        <div class="fila">

            <span class="label">Ubicación</span>

            <span class="valor" id="ubicacion"></span>

        </div>

    </div>

</div>

<script>

const panel = document.getElementById("panel");

const loteEl = document.getElementById("lote");
const estadoEl = document.getElementById("estado");
const medidasEl = document.getElementById("medidas");
const areaEl = document.getElementById("area");
const ubicacionEl = document.getElementById("ubicacion");
const imagenEl = document.getElementById("imagen");

document.getElementById("cerrar")
.addEventListener("click",()=>{

    panel.classList.remove("visible");

});

function obtenerParametro(nombre){

    const url = new URL(window.location.href);

    return url.searchParams.get(nombre);

}

function cargarLote(){

    const script = document.createElement("script");

    script.src =
    "https://script.google.com/macros/s/AKfycbxBOEvdiRzdowvAkexEdUZrEgKxqi9lJCSy6bnqLMVgdvYQv_PMGYKv2-U71sWzauR8/exec?callback=procesarDatos";

    document.body.appendChild(script);

}

function procesarDatos(datos){

    const loteBuscado =
    obtenerParametro("lote");

    if(!loteBuscado){

        loteEl.textContent =
        "No se indicó lote";

        return;

    }

    const lote =
    datos.find(item =>
        item.Lote === loteBuscado
    );

    if(!lote){

        loteEl.textContent =
        "Lote no encontrado";

        return;

    }

    loteEl.textContent =
    lote.Lote;

    medidasEl.textContent =
    lote.Medidas || "-";

    areaEl.textContent =
    lote.Area || "-";

    ubicacionEl.textContent =
    lote.Ubicacion || "-";

    estadoEl.textContent =
    lote.Estado || "";

    estadoEl.className = "";

    const estado =
    (lote.Estado || "")
    .toUpperCase();

    if(estado === "LIBRE"){

        estadoEl.classList
        .add("estado-libre");

    }
    else if(
        estado === "RESERVADO"
    ){

        estadoEl.classList
        .add("estado-reservado");

    }
    else{

        estadoEl.classList
        .add("estado-vendido");

    }

    if(
        lote.Imagen &&
        lote.Imagen.trim() !== ""
    ){

        imagenEl.src =
        lote.Imagen;

    }
    else{

        imagenEl.src =
        "thumbnail.png";

    }

    setTimeout(()=>{

        panel.classList
        .add("visible");

    },100);

}

cargarLote();

</script>

</body>
</html>
