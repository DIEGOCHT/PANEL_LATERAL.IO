<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Panel Administrativo</title>

<style>

*{
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f3f4f6;
}

#loginBox{
    width:400px;
    max-width:95vw;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

h2{
    margin-top:0;
    text-align:center;
    color:#2c3e50;
}

input{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:1px solid #ddd;
    border-radius:12px;
    font-size:15px;
}

button{
    width:100%;
    margin-top:20px;
    padding:14px;
    border:none;
    border-radius:30px;
    background:#3f4d5d;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

#error{
    margin-top:15px;
    color:red;
    text-align:center;
}

#panel{
    display:none;
    width:95%;
    max-width:1200px;
}

#usuarioLogeado{
    background:white;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

#contenedorLotes{
    margin-top:20px;
}

.tabla{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:15px;
    overflow:hidden;
}

.tabla th{
    background:#3f4d5d;
    color:white;
    padding:15px;
    text-align:left;
}

.tabla td{
    padding:12px;
    border-bottom:1px solid #eee;
}

.estado-libre{
    color:#16a34a;
    font-weight:bold;
}

.estado-reservado{
    color:#eab308;
    font-weight:bold;
}

.estado-vendido{
    color:#dc2626;
    font-weight:bold;
}

</style>

</head>
<body>

<div id="loginBox">

    <h2>Panel Administrativo</h2>

    <input
        type="text"
        id="usuario"
        placeholder="Usuario">

    <input
        type="password"
        id="password"
        placeholder="Contraseña">

    <button id="btnLogin">

        Ingresar

    </button>

    <div id="error"></div>

</div>

<div id="panel">

    <div id="usuarioLogeado"></div>

    <div id="contenedorLotes"></div>

</div>

<script>

document
.getElementById("btnLogin")
.addEventListener("click",login);

async function login(){

    const usuario =
    document.getElementById("usuario")
    .value.trim();

    const password =
    document.getElementById("password")
    .value.trim();

    if(
        usuario === "" ||
        password === ""
    ){

        document
        .getElementById("error")
        .textContent =
        "Ingrese usuario y contraseña";

        return;

    }

    try{

        const respuesta =
        await fetch(
        "https://script.google.com/macros/s/AKfycbzju385U93y9LzS-yStDOsO9i2vo97oAS-VaKRkMsV3giDUud34jAB5pbwvDior0tbN/exec",
        {
            method:"POST",

            body:JSON.stringify({

                action:"login",

                usuario:usuario,

                password:password

            })

        });

        const resultado =
        await respuesta.json();

        if(resultado.ok){

            document
            .getElementById("loginBox")
            .style.display = "none";

            document
            .getElementById("panel")
            .style.display = "block";

            document
            .getElementById("usuarioLogeado")
            .innerHTML =

            "<h2>Bienvenido " +
            resultado.nombre +
            "</h2>" +

            "<p><b>Rol:</b> " +
            resultado.rol +
            "</p>";

            cargarLotes();;
        }
        else{

            document
            .getElementById("error")
            .textContent =
            "Usuario o contraseña incorrectos";

        }

    }
    catch(error){

        document
        .getElementById("error")
        .textContent =
        "Error de conexión";

        console.log(error);

    }

}

async function cargarLotes(){

    const respuesta =
    await fetch(
    "https://script.google.com/macros/s/AKfycbzju385U93y9LzS-yStDOsO9i2vo97oAS-VaKRkMsV3giDUud34jAB5pbwvDior0tbN/exec"
    );

    const datos =
    await respuesta.json();

    let html = `
    <table class="tabla">
        <tr>
            <th>Lote</th>
            <th>Estado</th>
            <th>Área</th>
            <th>Ubicación</th>
        </tr>
    `;

    datos.forEach(lote=>{

        let clase = "";

        if(lote.Estado === "LIBRE"){
            clase = "estado-libre";
        }
        else if(lote.Estado === "RESERVADO"){
            clase = "estado-reservado";
        }
        else{
            clase = "estado-vendido";
        }

        html += `
        <tr>
            <td>${lote.Lote}</td>
            <td class="${clase}">
                ${lote.Estado}
            </td>
            <td>${lote.Area}</td>
            <td>${lote.Ubicacion}</td>
        </tr>
        `;

    });

    html += "</table>";

    document
    .getElementById("contenedorLotes")
    .innerHTML = html;

}
</script>

</body>
</html>
