<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Panel Administrativo</title>

<style>

*{
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f3f4f6;
}

#loginBox{
    width:400px;
    max-width:95vw;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

h2{
    margin-top:0;
    text-align:center;
    color:#2c3e50;
}

input{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:1px solid #ddd;
    border-radius:12px;
    font-size:15px;
}

button{
    width:100%;
    margin-top:20px;
    padding:14px;
    border:none;
    border-radius:30px;
    background:#3f4d5d;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

#error{
    margin-top:15px;
    color:red;
    text-align:center;
}

#panel{
    display:none;
    width:95%;
    max-width:1200px;
}

#usuarioLogeado{
    background:white;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

#contenedorLotes{
    margin-top:20px;
}

.tabla{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:15px;
    overflow:hidden;
}

.tabla th{
    background:#3f4d5d;
    color:white;
    padding:15px;
    text-align:left;
}

.tabla td{
    padding:12px;
    border-bottom:1px solid #eee;
}

.estado-libre{
    color:#16a34a;
    font-weight:bold;
}

.estado-reservado{
    color:#eab308;
    font-weight:bold;
}

.estado-vendido{
    color:#dc2626;
    font-weight:bold;
}

#modalEstado{

    position:fixed;

    inset:0;

    background:rgba(0,0,0,.4);

    display:none;

    justify-content:center;

    align-items:center;

    z-index:9999;

}

#ventanaEstado{

    width:400px;

    max-width:95vw;

    background:white;

    border-radius:20px;

    padding:25px;

}

#ventanaEstado select{

    width:100%;

    padding:12px;

    margin-top:15px;

    border:1px solid #ddd;

    border-radius:10px;

    font-size:16px;

}

.accionesModal{

    display:flex;

    gap:10px;

    margin-top:20px;

}

.accionesModal button{

    flex:1;

}
#menuAdmin{

    display:flex;
    gap:10px;
    margin-bottom:20px;

}

#menuAdmin button{

    width:auto;
    padding:12px 25px;

}

#contenedorAuditoria{

    margin-top:20px;

}
#herramientas{

    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:20px;

}

#buscarLote{

    width:250px;
    margin:0;

}

#herramientas button{

    width:auto;
    margin:0;
    padding:10px 18px;

}
#dashboard{

    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:20px;

}

.cardDashboard{

    min-width:180px;

    background:white;

    padding:20px;

    border-radius:15px;

    box-shadow:
    0 5px 15px
    rgba(0,0,0,.08);

}

.cardDashboard h3{

    margin:0;

    font-size:28px;

}

.cardDashboard p{

    margin:5px 0 0 0;

    font-weight:bold;

}
</style>

</head>
<body>

<div id="loginBox">

    <h2>Panel Administrativo</h2>

    <input
        type="text"
        id="usuario"
        placeholder="Usuario">

    <input
        type="password"
        id="password"
        placeholder="Contraseña">

    <button id="btnLogin">

        Ingresar

    </button>

    <div id="error"></div>

</div>

<div id="panel">

    <div id="usuarioLogeado"></div>
    <div id="dashboard"></div>

    <div id="menuAdmin">

        <button id="btnLotes">
            LOTES
        </button>

        <button id="btnAuditoria">
            AUDITORÍA
        </button>

    </div>

    <div id="herramientas">

    <input
    type="text"
    id="buscarLote"
    placeholder="🔍 Buscar lote...">

    <button
    id="filtroTodos">

        TODOS

    </button>

    <button
    id="filtroLibres">

        LIBRES

    </button>

    <button
    id="filtroReservados">

        RESERVADOS

    </button>

    <button
    id="filtroVendidos">

        VENDIDOS

    </button>

    <button
    id="cerrarSesion">

        Cerrar Sesión

    </button>

</div>

<div id="contenedorLotes"></div>

    <div id="contenedorAuditoria"
         style="display:none">
    </div>

</div>
<div id="modalEstado">

    <div id="ventanaEstado">

        <h2>Cambiar Estado</h2>

        <p id="loteSeleccionado"></p>

        <select id="nuevoEstado">

            <option value="LIBRE">LIBRE</option>

            <option value="RESERVADO">RESERVADO</option>

            <option value="VENDIDO">VENDIDO</option>

        </select>

        <div class="accionesModal">

            <button
            id="btnCancelarEstado">

                Cancelar

            </button>

            <button
            id="btnGuardarEstado">

                Guardar

            </button>

        </div>

    </div>

</div>

<script>

document
.getElementById("btnLogin")
.addEventListener("click",login);

async function login(){

    const usuario =
    document.getElementById("usuario")
    .value.trim();

    const password =
    document.getElementById("password")
    .value.trim();

    if(
        usuario === "" ||
        password === ""
    ){

        document
        .getElementById("error")
        .textContent =
        "Ingrese usuario y contraseña";

        return;

    }

    try{

        const respuesta =
        await fetch(
        "https://script.google.com/macros/s/AKfycbzju385U93y9LzS-yStDOsO9i2vo97oAS-VaKRkMsV3giDUud34jAB5pbwvDior0tbN/exec",
        {
            method:"POST",

            body:JSON.stringify({

    action:"login",

    usuario:usuario,

    password:password

})

});

        const resultado =
        await respuesta.json();

        if(resultado.ok){

    localStorage.setItem(
    "rol",
    resultado.rol
    );

    localStorage.setItem(
    "usuario",
    resultado.nombre
    );

    document
    .getElementById("loginBox")
    .style.display = "none";

    document
    .getElementById("panel")
    .style.display = "block";

    if(resultado.rol !== "ADMIN"){

        document
        .getElementById("btnAuditoria")
        .style.display = "none";

    }

            document
            .getElementById("usuarioLogeado")
            .innerHTML =

            "<h2>Bienvenido " +
            resultado.nombre +
            "</h2>" +

            "<p><b>Rol:</b> " +
            resultado.rol +
            "</p>";

            cargarLotes();
        }
        else{

            document
            .getElementById("error")
            .textContent =
            "Usuario o contraseña incorrectos";

        }

    }
    catch(error){

        document
        .getElementById("error")
        .textContent =
        "Error de conexión";

        console.log(error);

    }

}

let todosLosLotes = [];

let filtroActual = "TODOS";

function renderizarLotes(datos){

let html = `
<table class="tabla">
<tr>
<th>Lote</th>
<th>Estado</th>
<th>Área</th>
<th>Ubicación</th>
<th>Acción</th>
</tr>
`;

datos.forEach(lote=>{

let clase="";

if(lote.Estado==="LIBRE"){
clase="estado-libre";
}
else if(lote.Estado==="RESERVADO"){
clase="estado-reservado";
}
else{
clase="estado-vendido";
}

html += `
<tr>
<td>${lote.Lote}</td>

<td class="${clase}">
${lote.Estado}
</td>

<td>${lote.Area}</td>

<td>${lote.Ubicacion}</td>

<td>

<button
onclick="cambiarEstado('${lote.Lote}')">

Cambiar

</button>

</td>

</tr>
`;

});

html += "</table>";

document
.getElementById(
"contenedorLotes"
)
.innerHTML =
html;

}
function renderizarLotes(datos){

let html = `
<table class="tabla">
    <tr>
        <th>Lote</th>
        <th>Estado</th>
        <th>Área</th>
        <th>Ubicación</th>
        <th>Acción</th>
    </tr>
`;

datos.forEach(lote=>{

    let clase = "";

    if(lote.Estado === "LIBRE"){
        clase = "estado-libre";
    }
    else if(lote.Estado === "RESERVADO"){
        clase = "estado-reservado";
    }
    else{
        clase = "estado-vendido";
    }

    html += `
    <tr>

        <td>${lote.Lote}</td>

        <td class="${clase}">
            ${lote.Estado}
        </td>

        <td>${lote.Area}</td>

        <td>${lote.Ubicacion}</td>

        <td>

            <button
            onclick="cambiarEstado('${lote.Lote}')">

                Cambiar

            </button>

        </td>

    </tr>
    `;

});

html += "</table>";

document
.getElementById(
"contenedorLotes"
)
.innerHTML =
html;

}

function actualizarDashboard(datos){

```
const total =
datos.length;

const libres =
datos.filter(
x=>x.Estado==="LIBRE"
).length;

const reservados =
datos.filter(
x=>x.Estado==="RESERVADO"
).length;

const vendidos =
datos.filter(
x=>x.Estado==="VENDIDO"
).length;

document
.getElementById(
"dashboard"
)
.innerHTML = `

<div class="cardDashboard">

    <h3>${total}</h3>

    <p>Total Lotes</p>

</div>

<div class="cardDashboard">

    <h3>${libres}</h3>

    <p>🟢 Libres</p>

</div>

<div class="cardDashboard">

    <h3>${reservados}</h3>

    <p>🟡 Reservados</p>

</div>

<div class="cardDashboard">

    <h3>${vendidos}</h3>

    <p>🔴 Vendidos</p>

</div>

`;
```

}

async function cargarLotes(){

    const respuesta =
    await fetch(
    "https://script.google.com/macros/s/AKfycbzju385U93y9LzS-yStDOsO9i2vo97oAS-VaKRkMsV3giDUud34jAB5pbwvDior0tbN/exec"
    );

    const datos =
    await respuesta.json();

    todosLosLotes = datos;
actualizarDashboard(datos);

    renderizarLotes(datos);

}
document
.getElementById(
"btnCancelarEstado"
)
.addEventListener(
"click",
()=>{

    document
    .getElementById(
    "modalEstado"
    )
    .style.display =
    "none";

});

document
.getElementById(
"btnGuardarEstado"
)
.addEventListener(
"click",
guardarEstado
);
let loteActual = "";
async function guardarEstado(){

    const estado =
    document
    .getElementById("nuevoEstado")
    .value;

    const usuario =
    localStorage.getItem(
    "usuario"
    );

    const respuesta =
    await fetch(
    "https://script.google.com/macros/s/AKfycbzju385U93y9LzS-yStDOsO9i2vo97oAS-VaKRkMsV3giDUud34jAB5pbwvDior0tbN/exec",
    {
        method:"POST",

        body:JSON.stringify({

            action:"actualizarEstado",

            lote:loteActual,

            estado:estado,

            usuario:usuario

        })

    });

    const resultado =
    await respuesta.json();

    if(resultado.ok){

        document
        .getElementById("modalEstado")
        .style.display =
        "none";

        cargarLotes();

        alert(
        "Estado actualizado correctamente"
        );

    }
    else{

        alert(
        "No se pudo actualizar"
        );

    }

}
function cambiarEstado(lote){

    loteActual = lote;

    document
    .getElementById(
        "loteSeleccionado"
    )
    .textContent =
    lote;

    document
    .getElementById(
        "modalEstado"
    )
    .style.display =
    "flex";

}

document
.getElementById("btnLotes")
.addEventListener(
"click",
()=>{

    document
    .getElementById(
    "contenedorLotes"
    )
    .style.display =
    "block";
document
.getElementById(
"herramientas"
)
.style.display =
"flex";

    document
    .getElementById(
    "contenedorAuditoria"
    )
    .style.display =
    "none";
document
.getElementById(
"dashboard"
)
.style.display =
"flex";
});

document
.getElementById("btnAuditoria")
.addEventListener(
"click",
cargarAuditoria
);
async function cargarAuditoria(){
document
.getElementById(
"dashboard"
)
.style.display =
"none";
    document
    .getElementById(
    "contenedorLotes"
    )
    .style.display =
    "none";

    document
    .getElementById(
    "contenedorAuditoria"
    )
    .style.display =
    "block";
document
.getElementById(
"herramientas"
)
.style.display =
"none";

    const respuesta =
    await fetch(
    "https://script.google.com/macros/s/AKfycbzju385U93y9LzS-yStDOsO9i2vo97oAS-VaKRkMsV3giDUud34jAB5pbwvDior0tbN/exec?action=auditoria"
    );

    const datos =
    await respuesta.json();

    let html = `

    <table class="tabla">

      <tr>

        <th>Fecha</th>

        <th>Usuario</th>

        <th>Lote</th>

        <th>Antes</th>

        <th>Después</th>

      </tr>

    `;

    datos.forEach(item=>{

      html += `

      <tr>

        <td>${item.Fecha || ""}</td>

        <td>${item.Usuario || ""}</td>

        <td>${item.Lote || ""}</td>

        <td>${item.Antes || ""}</td>

        <td>${item.Despues || ""}</td>

      </tr>

      `;

    });

    html += "</table>";

    document
    .getElementById(
    "contenedorAuditoria"
    )
    .innerHTML =
    html;

}
document
.getElementById("buscarLote")
.addEventListener(
"input",
filtrarLotes
);

function filtrarLotes(){

const texto =
document
.getElementById(
"buscarLote"
)
.value
.toUpperCase();

let datos =
todosLosLotes.filter(
lote=>

lote.Lote
.toUpperCase()
.includes(texto)
);

if(
filtroActual !==
"TODOS"
){

datos =
datos.filter(
lote=>
lote.Estado ===
filtroActual
);

}

renderizarLotes(datos);

}
document
.getElementById(
"filtroTodos"
)
.onclick=()=>{
filtroActual="TODOS";
filtrarLotes();
};

document
.getElementById(
"filtroLibres"
)
.onclick=()=>{
filtroActual="LIBRE";
filtrarLotes();
};

document
.getElementById(
"filtroReservados"
)
.onclick=()=>{
filtroActual="RESERVADO";
filtrarLotes();
};

document
.getElementById(
"filtroVendidos"
)
.onclick=()=>{
filtroActual="VENDIDO";
filtrarLotes();
};
document
.getElementById(
"cerrarSesion"
)
.onclick=()=>{

localStorage.clear();

location.reload();

};
document
.getElementById("buscarLote")
.addEventListener(
"input",
filtrarLotes
);

function filtrarLotes(){

    const texto =
    document
    .getElementById(
    "buscarLote"
    )
    .value
    .toUpperCase();

    let datos =
    todosLosLotes.filter(
    lote=>

    lote.Lote
    .toUpperCase()
    .includes(texto)
    );

    if(
    filtroActual !==
    "TODOS"
    ){

        datos =
        datos.filter(
        lote=>

        lote.Estado ===
        filtroActual
        );

    }

    renderizarLotes(datos);

}
document
.getElementById(
"filtroTodos"
)
.onclick=()=>{

    filtroActual="TODOS";

    filtrarLotes();

};

document
.getElementById(
"filtroLibres"
)
.onclick=()=>{

    filtroActual="LIBRE";

    filtrarLotes();

};

document
.getElementById(
"filtroReservados"
)
.onclick=()=>{

    filtroActual="RESERVADO";

    filtrarLotes();

};

document
.getElementById(
"filtroVendidos"
)
.onclick=()=>{

    filtroActual="VENDIDO";

    filtrarLotes();

};
</script>

</body>
</html>
