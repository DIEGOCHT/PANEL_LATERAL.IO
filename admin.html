<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Panel Administrativo</title>

<style>

*{
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f3f4f6;
}

#loginBox{
    width:400px;
    max-width:95vw;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

h2{
    margin-top:0;
    text-align:center;
    color:#2c3e50;
}

input{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:1px solid #ddd;
    border-radius:12px;
    font-size:15px;
}

button{
    width:100%;
    margin-top:20px;
    padding:14px;
    border:none;
    border-radius:30px;
    background:#3f4d5d;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

#error{
    margin-top:15px;
    color:red;
    text-align:center;
}

#panel{
    display:none;
    width:95%;
    max-width:1200px;
}

#usuarioLogeado{
    background:white;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}
#usuarioHeader{

    position:relative;

    margin-bottom:20px;

}
#contenedorLotes{
    margin-top:20px;
}

.tabla{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:15px;
    overflow:hidden;
}

.tabla th{
    background:#3f4d5d;
    color:white;
    padding:15px;
    text-align:left;
}

.tabla td{
    padding:12px;
    border-bottom:1px solid #eee;
}

.estado-libre{
    color:#16a34a;
    font-weight:bold;
}

.estado-reservado{
    color:#eab308;
    font-weight:bold;
}

.estado-vendido{
    color:#dc2626;
    font-weight:bold;
}

#modalEstado{

    position:fixed;

    inset:0;

    background:rgba(0,0,0,.4);

    display:none;

    justify-content:center;

    align-items:center;

    z-index:9999;

}

#ventanaEstado{

    width:400px;

    max-width:95vw;

    background:white;

    border-radius:20px;

    padding:25px;

}

#ventanaEstado select{

    width:100%;

    padding:12px;

    margin-top:15px;

    border:1px solid #ddd;

    border-radius:10px;

    font-size:16px;

}

.accionesModal{

    display:flex;

    gap:10px;

    margin-top:20px;

}

.accionesModal button{

    flex:1;

}
#menuAdmin{

    display:flex;
    gap:10px;
    margin-bottom:20px;

    flex-wrap:wrap;

    justify-content:center;

}

#menuAdmin button{

    width:auto;
    padding:12px 25px;

}

#contenedorAuditoria{

    margin-top:20px;

}
#herramientas{

    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:20px;

}

#buscarLote{

    width:250px;
    margin:0;

}

#herramientas button{

    width:auto;
    margin:0;
    padding:10px 18px;

}
#dashboard{

    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:20px;

    justify-content:center;

}

.cardDashboard{

    width:220px;

    background:white;

    padding:20px;

    border-radius:15px;

}

.cardDashboard h3{

    margin:0;

    font-size:28px;

}

.cardDashboard p{

    margin:5px 0 0 0;

    font-weight:bold;

}
#cerrarSesion{

    position:absolute;

    top:20px;

    right:20px;

    width:auto;

    margin:0;

    padding:12px 25px;

    background:#dc2626;

}
.btnNotificacion{

    position:relative;

    display:inline-block;

}

.badgeNotificacion{

    position:absolute;

    top:-8px;

    right:-8px;

    min-width:22px;

    height:22px;

    padding:0 6px;

    border-radius:50px;

    background:#e11d48;

    color:white;

    font-size:12px;

    font-weight:bold;

    display:flex;

    align-items:center;

    justify-content:center;

    animation:pulse 1s infinite;

}

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.2);
    }

    100%{
        transform:scale(1);
    }

}
</style>

</head>

<script>

document
.getElementById("btnLogin")
.addEventListener("click",login);
document
.getElementById("password")

function(){

    this.select();

});
function aplicarPermisosRol(rol){

    if(rol === "ASESOR"){

        document
        .getElementById("btnAuditoria")
        .style.display = "none";

        document
        .getElementById("btnAsesores")
        .style.display = "none";

        document
        .getElementById("btnConsultas")
        .style.display = "none";
document
.getElementById("btnSolicitudes")
.style.display = "none";
    }
    else{

        document
        .getElementById("btnAuditoria")
        .style.display = "inline-block";

        document
        .getElementById("btnAsesores")
        .style.display = "inline-block";

        document
        .getElementById("btnConsultas")
        .style.display = "inline-block";
document
.getElementById("btnSolicitudes")
.style.display = "inline-block";

    }

}
async function login(){

    const usuario =
    document.getElementById("usuario")
    .value.trim();

    const password =
    document.getElementById("password")
    .value.trim();

    if(
        usuario === "" ||
        password === ""
    ){

        document
        .getElementById("error")
        .textContent =
        "Ingrese usuario y contraseña";

        return;

    }

    try{

        const respuesta =
        await fetch(
        "https://script.google.com/macros/s/AKfycbzju385U93y9LzS-yStDOsO9i2vo97oAS-VaKRkMsV3giDUud34jAB5pbwvDior0tbN/exec",
        {
            method:"POST",

            body:JSON.stringify({

    action:"login",

    usuario:usuario,

    password:password

})

});

        const resultado =
        await respuesta.json();

        if(resultado.ok){

    localStorage.setItem(
"rol",
resultado.rol
);

aplicarPermisosRol(
resultado.rol
);

localStorage.setItem(
"usuario",
resultado.nombre
);
localStorage.setItem(
"logeado",
"SI"
);
    document
    .getElementById("loginBox")
    .style.display = "none";

    document
    .getElementById("panel")
    .style.display = "block";

            document
            .getElementById("usuarioLogeado")
            .innerHTML =

            "<h2>Bienvenido " +
            resultado.nombre +
            "</h2>" +

            "<p><b>Rol:</b> " +
            resultado.rol +
            "</p>";

            cargarLotes();
verificarNotificaciones();

        }
        else{

    document
    .getElementById("error")
    .textContent =
    "Usuario o contraseña incorrectos";

    const campoPassword =
    document.getElementById(
    "password"
    );

    campoPassword.value = "";

    campoPassword.focus();

}

    }
    catch(error){

        document
        .getElementById("error")
        .textContent =
        "Error de conexión";

        console.log(error);

    }

}

let todosLosLotes = [];

let filtroActual = "TODOS";

let solicitudesPendientes = [];

function renderizarLotes(datos){

let html = `
<table class="tabla">
    <tr>
        <th>Lote</th>
        <th>Estado</th>
        <th>Área</th>
        <th>Ubicación</th>
        <th>Acción</th>
    </tr>
`;

datos.forEach(lote=>{

const pendiente =
solicitudesPendientes.find(
s =>
s.Lote === lote.Lote &&
s.Estado === "PENDIENTE"
);

const indicador =
pendiente
? " ⏳"
: "";

    let clase = "";

    if(lote.Estado === "LIBRE"){
        clase = "estado-libre";
    }
    else if(lote.Estado === "RESERVADO"){
        clase = "estado-reservado";
    }
    else{
        clase = "estado-vendido";
    }

    html += `
    <tr>

        <td>${lote.Lote}</td>

        <td class="${clase}">
    ${lote.Estado}
    ${indicador}
</td>

        <td>${lote.Area}</td>

        <td>${lote.Ubicacion}</td>

        <td style="
text-align:center;
vertical-align:middle;
">

<button

${pendiente ? "disabled" : ""}

style="
width:180px;
margin:0 auto;
display:block;
opacity:${pendiente ? "0.5" : "1"};
"

onclick="cambiarEstado('${lote.Lote}')">

Cambiar

</button>

</td>

    </tr>
    `;

});

html += "</table>";

document
.getElementById(
"contenedorLotes"
)
.innerHTML =
html;

}

async function verificarNotificaciones(){

    const rol =
    localStorage.getItem("rol");

    if(rol !== "ADMIN"){
        return;
    }

    // CONSULTAS

    const r1 =
    await fetch(
    "https://script.google.com/macros/s/AKfycbzju385U93y9LzS-yStDOsO9i2vo97oAS-VaKRkMsV3giDUud34jAB5pbwvDior0tbN/exec?action=ultimaConsulta"
    );

    const consulta =
    await r1.json();

    const ultimaVistaConsulta =
    localStorage.getItem(
    "consultasVistas"
    ) || 0;

    if(
      new Date(
      consulta.fecha
      ).getTime()
      >
      Number(
      ultimaVistaConsulta
      )
    ){

        document
        .getElementById(
        "badgeConsultas"
        )
        .style.display =
        "flex";

    }

    // AUDITORIA

    const r2 =
    await fetch(
    "https://script.google.com/macros/s/AKfycbzju385U93y9LzS-yStDOsO9i2vo97oAS-VaKRkMsV3giDUud34jAB5pbwvDior0tbN/exec?action=ultimaAuditoria"
    );

    const auditoria =
    await r2.json();

    const ultimaVistaAuditoria =
    localStorage.getItem(
    "auditoriaVista"
    ) || 0;

    if(
      new Date(
      auditoria.fecha
      ).getTime()
      >
      Number(
      ultimaVistaAuditoria
      )
    ){

        document
        .getElementById(
        "badgeAuditoria"
        )
        .style.display =
        "flex";

    }

}
function actualizarDashboard(datos){

const total =
datos.length;

const libres =
datos.filter(
x=>x.Estado==="LIBRE"
).length;

const reservados =
datos.filter(
x=>x.Estado==="RESERVADO"
).length;

const vendidos =
datos.filter(
x=>x.Estado==="VENDIDO"
).length;

document
.getElementById(
"dashboard"
)
.innerHTML = `

<div class="cardDashboard">

    <h3>${total}</h3>

    <p>Total Lotes</p>

</div>

<div class="cardDashboard">

    <h3>${libres}</h3>

    <p>🟢 Libres</p>

</div>

<div class="cardDashboard">

    <h3>${reservados}</h3>

    <p>🟡 Reservados</p>

</div>

<div class="cardDashboard">

    <h3>${vendidos}</h3>

    <p>🔴 Vendidos</p>

</div>

`;

}

async function cargarLotes(){

    const respuesta =
    await fetch(
    "https://script.google.com/macros/s/AKfycbzju385U93y9LzS-yStDOsO9i2vo97oAS-VaKRkMsV3giDUud34jAB5pbwvDior0tbN/exec"
    );

    const datos =
    await respuesta.json();

    const respuestaSolicitudes =
    await fetch(
    "https://script.google.com/macros/s/AKfycbzju385U93y9LzS-yStDOsO9i2vo97oAS-VaKRkMsV3giDUud34jAB5pbwvDior0tbN/exec?action=solicitudes"
    );

    solicitudesPendientes =
    await respuestaSolicitudes.json();

    todosLosLotes = datos;

    actualizarDashboard(datos);

    renderizarLotes(datos);

}
document
.getElementById(
"btnCancelarEstado"
)
.addEventListener(
"click",
()=>{

    document
    .getElementById(
    "modalEstado"
    )
    .style.display =
    "none";

    cargarLotes();

});


document
.getElementById(
"btnGuardarEstado"
)
.addEventListener(
"click",
guardarEstado
);
let loteActual = "";
async function guardarEstado(){

    const estado =
    document
    .getElementById("nuevoEstado")
    .value;
const rol =
localStorage.getItem(
"rol"
);

const estadoActual =
document
.getElementById(
"loteSeleccionado"
)
.textContent;

    const usuario =
    localStorage.getItem(
    "usuario"
    );

    if(
rol === "ASESOR" &&
(
estadoActual.includes("RESERVADO") ||
estadoActual.includes("VENDIDO")
)
){

    await fetch(
    "https://script.google.com/macros/s/AKfycbzju385U93y9LzS-yStDOsO9i2vo97oAS-VaKRkMsV3giDUud34jAB5pbwvDior0tbN/exec",
    {
        method:"POST",

        body:JSON.stringify({

            action:"crearSolicitud",

            lote:loteActual,

estadoActual

            estado

    });

    document

    )
    .style.display =
    "none";

   mostrarNotificacion(

"Solicitud enviada",

"Tu solicitud fue enviada al administrador."

);
return;
}
const respuesta =
    await fetch(
    "https://script.google.com/macros/s/AKfycbzju385U93y9LzS-yStDOsO9i2vo97oAS-VaKRkMsV3giDUud34jAB5pbwvDior0tbN/exec",
    {
        method:"POST",

        body:JSON.stringify({

            lote:loteActual,

            estado:estado,

    const resultado =

    if(resultado.ok){

    document

async function cambiarEstado(lote){

    const respuesta =
    await fetch(
    "https://script.google.com/macros/s/AKfycbzju385U93y9LzS-yStDOsO9i2vo97oAS-VaKRkMsV3giDUud34jAB5pbwvDior0tbN/exec"
    );

    const datos =
    await respuesta.json();

    const loteActualizado =
    datos.find(
    x => x.Lote === lote
    );
cargarLotes();

    if(!loteActualizado){

    mostrarNotificacion(

    "Error",

    "No se pudo obtener el estado actual del lote."

    );

    return;

}
const rol =
localStorage.getItem(
"rol"
);
const solicitud =
await fetch(

"https://script.google.com/macros/s/AKfycbzju385U93y9LzS-yStDOsO9i2vo97oAS-VaKRkMsV3giDUud34jAB5pbwvDior0tbN/exec?action=solicitudPendiente&lote="

+

encodeURIComponent(lote)

);

const infoSolicitud =
await solicitud.json();

if(

rol === "ADMIN" &&

infoSolicitud.pendiente

){

mostrarNotificacion(

"Solicitud Pendiente",

"Existe una solicitud pendiente para este lote.<br><br>" +

"<b>Asesor:</b> " +

infoSolicitud.usuario +

"<br><br>" +

"<b>Solicita:</b><br>" +

infoSolicitud.actual +

" → " +

infoSolicitud.solicitado +

"<br><br>" +

"Primero debe aprobar o rechazar la solicitud."

);

return;

}    
const requiereAutorizacion =
rol === "ASESOR" &&
(
loteActualizado.Estado === "RESERVADO" ||
loteActualizado.Estado === "VENDIDO"
);

document
.getElementById(
"mensajeAutorizacion"
)
.style.display =
requiereAutorizacion
? "block"
: "none";

document
.getElementById(
"btnGuardarEstado"
)
.textContent =
requiereAutorizacion
? "Solicitar Cambio"
: "Guardar";

    loteActual = lote;

    document
    .getElementById(
    "loteSeleccionado"
    )
    .textContent =
    lote +
    " (" +
    loteActualizado.Estado +
    ")";

    document
    .getElementById(
    "modalEstado"
    )
    .style.display =
    "flex";

}

document
.getElementById("btnLotes")
.addEventListener(
"click",
()=>{
cargarLotes();
verificarNotificaciones();

function formatearFecha(fecha){

    const f =
    new Date(fecha);

    return f.toLocaleString(
    "es-PE",
    {

        day:"2-digit",
        month:"2-digit",
        year:"numeric",

        hour:"2-digit",
        minute:"2-digit",

        hour12:true

    }

    );

}

async function verificarMisSolicitudes(){

const rol =
localStorage.getItem(
"rol"
);

if(rol !== "ASESOR"){
return;
}

const usuario =
localStorage.getItem(
"usuario"
);

const respuesta =
await fetch(

"https://script.google.com/macros/s/AKfycbzju385U93y9LzS-yStDOsO9i2vo97oAS-VaKRkMsV3giDUud34jAB5pbwvDior0tbN/exec?action=misSolicitudes&usuario="

+

encodeURIComponent(usuario)

);

const datos =
await respuesta.json();
console.log(
"Mis solicitudes:",
datos
);

if(datos.length === 0){
