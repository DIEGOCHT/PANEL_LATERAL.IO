<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Panel Administrativo</title>

<style>

*{
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f3f4f6;
}

#loginBox{
    width:400px;
    max-width:95vw;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

h2{
    margin-top:0;
    text-align:center;
    color:#2c3e50;
}

input{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:1px solid #ddd;
    border-radius:12px;
    font-size:15px;
}

button{
    width:100%;
    margin-top:20px;
    padding:14px;
    border:none;
    border-radius:30px;
    background:#3f4d5d;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

#error{
    margin-top:15px;
    color:red;
    text-align:center;
}

#panel{
    display:none;
    width:95%;
    max-width:1200px;
}

#usuarioLogeado{
    background:white;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}
#usuarioHeader{

    position:relative;

    margin-bottom:20px;

}
#contenedorLotes{
    margin-top:20px;
}

.tabla{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:15px;
    overflow:hidden;
}

.tabla th{
    background:#3f4d5d;
    color:white;
    padding:15px;
    text-align:left;
}

.tabla td{
    padding:12px;
    border-bottom:1px solid #eee;
}

.estado-libre{
    color:#16a34a;
    font-weight:bold;
}

.estado-reservado{
    color:#eab308;
    font-weight:bold;
}

.estado-vendido{
    color:#dc2626;
    font-weight:bold;
}

#modalEstado{

    position:fixed;

    inset:0;

    background:rgba(0,0,0,.4);

    display:none;

    justify-content:center;

    align-items:center;

    z-index:9999;

}

#ventanaEstado{

    width:400px;

    max-width:95vw;

    background:white;

    border-radius:20px;

    padding:25px;

}

#ventanaEstado select{

    width:100%;

    padding:12px;

    margin-top:15px;

    border:1px solid #ddd;

    border-radius:10px;

    font-size:16px;

}

.accionesModal{

    display:flex;

    gap:10px;

    margin-top:20px;

}

.accionesModal button{

    flex:1;

}
#menuAdmin{

    display:flex;
    gap:10px;
    margin-bottom:20px;

}

#menuAdmin button{

    width:auto;
    padding:12px 25px;

}

#contenedorAuditoria{

    margin-top:20px;

}
#herramientas{

    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:20px;

}

#buscarLote{

    width:250px;
    margin:0;

}

#herramientas button{

    width:auto;
    margin:0;
    padding:10px 18px;

}
#dashboard{

    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:20px;

}

.cardDashboard{

    min-width:180px;

    background:white;

    padding:20px;

    border-radius:15px;

    box-shadow:
    0 5px 15px
    rgba(0,0,0,.08);

}

.cardDashboard h3{

    margin:0;

    font-size:28px;

}

.cardDashboard p{

    margin:5px 0 0 0;

    font-weight:bold;

}
#cerrarSesion{

    position:absolute;

    top:20px;

    right:20px;

    width:auto;

    margin:0;

    padding:12px 25px;

    background:#dc2626;

}
.btnNotificacion{

    position:relative;

    display:inline-block;

}

.badgeNotificacion{

    position:absolute;

    top:-8px;

    right:-8px;

    min-width:22px;

    height:22px;

    padding:0 6px;

    border-radius:50px;

    background:#e11d48;

    color:white;

    font-size:12px;

    font-weight:bold;

    display:flex;

    align-items:center;

    justify-content:center;

    animation:pulse 1s infinite;

}

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.2);
    }

    100%{
        transform:scale(1);
    }

}
</style>

</head>
<body>

<div id="loginBox">

    <h2>Panel Administrativo</h2>

    <input
        type="text"
        id="usuario"
        placeholder="Usuario">

    <input
        type="password"
        id="password"
        placeholder="Contraseña">

    <button id="btnLogin">

        Ingresar

    </button>

    <div id="error"></div>

</div>

<div id="panel">

    <div id="usuarioHeader">

    <div id="usuarioLogeado"></div>

    <button id="cerrarSesion">

        Cerrar Sesión

    </button>

</div>
    <div id="dashboard"></div>

    <div id="menuAdmin">

    <button id="btnLotes">
        LOTES
    </button>

    <div class="btnNotificacion">

    <button id="btnAuditoria">
        AUDITORÍA
    </button>

    <span
    id="badgeAuditoria"
    class="badgeNotificacion"
    style="display:none;">
    </span>

</div>
    <button id="btnAsesores">
        ASESORES
    </button>

    <div class="btnNotificacion">

    <button
    id="btnConsultas"
    style="display:none;">
        CONSULTAS
    </button>

    <span
    id="badgeConsultas"
    class="badgeNotificacion"
    style="display:none;">
    </span>

</div>
</div>

    <div id="herramientas">

    <input
    type="text"
    id="buscarLote"
    placeholder="🔍 Buscar lote...">

    <button
    id="filtroTodos">

        TODOS

    </button>

    <button
    id="filtroLibres">

        LIBRES

    </button>

    <button
    id="filtroReservados">

        RESERVADOS

    </button>

    <button
    id="filtroVendidos">

        VENDIDOS

    </button>

    
</div>

<div id="contenedorLotes"></div>

    <div id="contenedorAuditoria"
         style="display:none">
    </div>
<div id="contenedorAsesores"
     style="display:none">
</div>
<div id="contenedorConsultas"
     style="display:none">
</div>

</div>
<div id="modalEstado">

    <div id="ventanaEstado">

        <h2>Cambiar Estado</h2>

        <p id="loteSeleccionado"></p>

        <select id="nuevoEstado">

            <option value="LIBRE">LIBRE</option>

            <option value="RESERVADO">RESERVADO</option>

            <option value="VENDIDO">VENDIDO</option>

        </select>

        <div class="accionesModal">

            <button
            id="btnCancelarEstado">

                Cancelar

            </button>

            <button
            id="btnGuardarEstado">

                Guardar

            </button>

        </div>

    </div>

</div>

<script>

document
.getElementById("btnLogin")
.addEventListener("click",login);
document
.getElementById("password")
.addEventListener(
"focus",
function(){

    this.select();

});
async function login(){

    const usuario =
    document.getElementById("usuario")
    .value.trim();

    const password =
    document.getElementById("password")
    .value.trim();

    if(
        usuario === "" ||
        password === ""
    ){

        document
        .getElementById("error")
        .textContent =
        "Ingrese usuario y contraseña";

        return;

    }

    try{

        const respuesta =
        await fetch(
        "https://script.google.com/macros/s/AKfycbzju385U93y9LzS-yStDOsO9i2vo97oAS-VaKRkMsV3giDUud34jAB5pbwvDior0tbN/exec",
        {
            method:"POST",

            body:JSON.stringify({

    action:"login",

    usuario:usuario,

    password:password

})

});

        const resultado =
        await respuesta.json();

        if(resultado.ok){

    localStorage.setItem(
"rol",
resultado.rol
);

if(resultado.rol === "ASESOR"){

    document
    .getElementById("btnAuditoria")
    .style.display = "none";

    document
    .getElementById("btnAsesores")
    .style.display = "none";

    document
    .getElementById("btnConsultas")
    .style.display = "none";

}
else{

    document
    .getElementById("btnAuditoria")
    .style.display = "inline-block";

    document
    .getElementById("btnAsesores")
    .style.display = "inline-block";

    document
    .getElementById("btnConsultas")
    .style.display = "inline-block";

}

localStorage.setItem(
"usuario",
resultado.nombre
);
localStorage.setItem(
"logeado",
"SI"
);
    document
    .getElementById("loginBox")
    .style.display = "none";

    document
    .getElementById("panel")
    .style.display = "block";

            document
            .getElementById("usuarioLogeado")
            .innerHTML =

            "<h2>Bienvenido " +
            resultado.nombre +
            "</h2>" +

            "<p><b>Rol:</b> " +
            resultado.rol +
            "</p>";

            cargarLotes();
verificarNotificaciones();

if(resultado.rol === "ADMIN"){

    
}
        }
        else{

    document
    .getElementById("error")
    .textContent =
    "Usuario o contraseña incorrectos";

    const campoPassword =
    document.getElementById(
    "password"
    );

    campoPassword.value = "";

    campoPassword.focus();

}

    }
    catch(error){

        document
        .getElementById("error")
        .textContent =
        "Error de conexión";

        console.log(error);

    }

}

let todosLosLotes = [];

let filtroActual = "TODOS";


function renderizarLotes(datos){

let html = `
<table class="tabla">
    <tr>
        <th>Lote</th>
        <th>Estado</th>
        <th>Área</th>
        <th>Ubicación</th>
        <th>Acción</th>
    </tr>
`;

datos.forEach(lote=>{

    let clase = "";

    if(lote.Estado === "LIBRE"){
        clase = "estado-libre";
    }
    else if(lote.Estado === "RESERVADO"){
        clase = "estado-reservado";
    }
    else{
        clase = "estado-vendido";
    }

    html += `
    <tr>

        <td>${lote.Lote}</td>

        <td class="${clase}">
            ${lote.Estado}
        </td>

        <td>${lote.Area}</td>

        <td>${lote.Ubicacion}</td>

        <td>

            <button
            onclick="cambiarEstado('${lote.Lote}')">

                Cambiar

            </button>

        </td>

    </tr>
    `;

});

html += "</table>";

document
.getElementById(
"contenedorLotes"
)
.innerHTML =
html;

}
async function verificarNotificaciones(){

    const rol =
    localStorage.getItem("rol");

    if(rol !== "ADMIN"){
        return;
    }

    // CONSULTAS

    const r1 =
    await fetch(
    "TU_URL?action=ultimaConsulta"
    );

    const consulta =
    await r1.json();

    const ultimaVistaConsulta =
    localStorage.getItem(
    "consultasVistas"
    ) || 0;

    if(
      new Date(
      consulta.fecha
      ).getTime()
      >
      Number(
      ultimaVistaConsulta
      )
    ){

        document
        .getElementById(
        "badgeConsultas"
        )
        .style.display =
        "flex";

    }

    // AUDITORIA

    const r2 =
    await fetch(
    "TU_URL?action=ultimaAuditoria"
    );

    const auditoria =
    await r2.json();

    const ultimaVistaAuditoria =
    localStorage.getItem(
    "auditoriaVista"
    ) || 0;

    if(
      new Date(
      auditoria.fecha
      ).getTime()
      >
      Number(
      ultimaVistaAuditoria
      )
    ){

        document
        .getElementById(
        "badgeAuditoria"
        )
        .style.display =
        "flex";

    }

}
function actualizarDashboard(datos){

const total =
datos.length;

const libres =
datos.filter(
x=>x.Estado==="LIBRE"
).length;

const reservados =
datos.filter(
x=>x.Estado==="RESERVADO"
).length;

const vendidos =
datos.filter(
x=>x.Estado==="VENDIDO"
).length;

document
.getElementById(
"dashboard"
)
.innerHTML = `

<div class="cardDashboard">

    <h3>${total}</h3>

    <p>Total Lotes</p>

</div>

<div class="cardDashboard">

    <h3>${libres}</h3>

    <p>🟢 Libres</p>

</div>

<div class="cardDashboard">

    <h3>${reservados}</h3>

    <p>🟡 Reservados</p>

</div>

<div class="cardDashboard">

    <h3>${vendidos}</h3>

    <p>🔴 Vendidos</p>

</div>

`;

}

async function cargarLotes(){

    const respuesta =
    await fetch(
    "https://script.google.com/macros/s/AKfycbzju385U93y9LzS-yStDOsO9i2vo97oAS-VaKRkMsV3giDUud34jAB5pbwvDior0tbN/exec"
    );

    const datos =
    await respuesta.json();

    todosLosLotes = datos;
actualizarDashboard(datos);

    renderizarLotes(datos);

}
document
.getElementById(
"btnCancelarEstado"
)
.addEventListener(
"click",
()=>{

    document
    .getElementById(
    "modalEstado"
    )
    .style.display =
    "none";

});


document
.getElementById(
"btnGuardarEstado"
)
.addEventListener(
"click",
guardarEstado
);
let loteActual = "";
async function guardarEstado(){

    const estado =
    document
    .getElementById("nuevoEstado")
    .value;

    const usuario =
    localStorage.getItem(
    "usuario"
    );

    const respuesta =
    await fetch(
    "https://script.google.com/macros/s/AKfycbzju385U93y9LzS-yStDOsO9i2vo97oAS-VaKRkMsV3giDUud34jAB5pbwvDior0tbN/exec",
    {
        method:"POST",

        body:JSON.stringify({

            action:"actualizarEstado",

            lote:loteActual,

            estado:estado,

            usuario:usuario

        })

    });

    const resultado =
    await respuesta.json();

    if(resultado.ok){

        document
        .getElementById("modalEstado")
        .style.display =
        "none";

        cargarLotes();

        alert(
        "Estado actualizado correctamente"
        );

    }
    else{

        alert(
        "No se pudo actualizar"
        );

    }

}
function cambiarEstado(lote){

    loteActual = lote;

    document
    .getElementById(
        "loteSeleccionado"
    )
    .textContent =
    lote;

    document
    .getElementById(
        "modalEstado"
    )
    .style.display =
    "flex";

}

document
.getElementById("btnLotes")
.addEventListener(
"click",
()=>{
document
.getElementById(
"contenedorConsultas"
)
.style.display =
"none";
    document
    .getElementById(
    "contenedorLotes"
    )
    .style.display =
    "block";
document
.getElementById(
"herramientas"
)
.style.display =
"flex";

    document
    .getElementById(
    "contenedorAuditoria"
    )
    .style.display =
    "none";
document
.getElementById(
"dashboard"
)
.style.display =
"flex";
});

document
.getElementById("btnAuditoria")
.addEventListener(
"click",
cargarAuditoria
);
async function cargarAuditoria(){
const rol =
localStorage.getItem("rol");

if(rol !== "ADMIN"){
    return;
}
document
.getElementById(
"dashboard"
)
.style.display =
"none";
    document
    .getElementById(
    "contenedorLotes"
    )
    .style.display =
    "none";

    document
    .getElementById(
    "contenedorAuditoria"
    )
    .style.display =
    "block";
document
.getElementById(
"contenedorConsultas"
)
.style.display =
"none";
document
.getElementById(
"herramientas"
)
.style.display =
"none";

    const respuesta =
    await fetch(
    "https://script.google.com/macros/s/AKfycbzju385U93y9LzS-yStDOsO9i2vo97oAS-VaKRkMsV3giDUud34jAB5pbwvDior0tbN/exec?action=auditoria"
    );

    const datos =
    await respuesta.json();
datos.sort((a,b)=>{

    return new Date(b.Fecha)
    -
    new Date(a.Fecha);

});
    let html = `

<h2>Auditoría de Cambios</h2>

<div style="
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
">

<b>Total de cambios:</b>
${datos.length}

</div>

<table class="tabla">

<tr>

        <th>Fecha</th>

        <th>Usuario</th>

        <th>Lote</th>

        <th>Antes</th>

        <th>Después</th>

      </tr>

    `;

    datos.forEach(item=>{

      html += `

      <tr>

        <td>${formatearFecha(item.Fecha)}</td>

        <td>${item.Usuario || ""}</td>

        <td>${item.Lote || ""}</td>

        <td>${item.Antes || ""}</td>

        <td>${item.Despues || ""}</td>

      </tr>

      `;

    });

    html += "</table>";

    document
    .getElementById(
    "contenedorAuditoria"
    )
    .innerHTML =
    html;
localStorage.setItem(
"auditoriaVista",
Date.now()
);

document
.getElementById(
"badgeAuditoria"
)
.style.display =
"none";
}
document
.getElementById("btnAsesores")
.addEventListener(
"click",
cargarAsesores
);
document
.getElementById("btnConsultas")
.addEventListener(
"click",
cargarConsultas
);

async function cargarAsesores(){

const rol =
localStorage.getItem("rol");

if(rol !== "ADMIN"){
    return;
}
    document
    .getElementById(
    "contenedorLotes"
    )
    .style.display =
    "none";

    document
    .getElementById(
    "contenedorAuditoria"
    )
    .style.display =
    "none";
document
.getElementById(
"contenedorConsultas"
)
.style.display =
"none";

    document
    .getElementById(
    "dashboard"
    )
    .style.display =
    "none";

    document
    .getElementById(
    "herramientas"
    )
    .style.display =
    "none";

    document
    .getElementById(
    "contenedorAsesores"
    )
    .style.display =
    "block";

    const respuesta =
    await fetch(
    "https://script.google.com/macros/s/AKfycbzju385U93y9LzS-yStDOsO9i2vo97oAS-VaKRkMsV3giDUud34jAB5pbwvDior0tbN/exec",
    {
        method:"POST",
        body:JSON.stringify({
            action:"listarAsesores"
        })
    });

    const asesores =
    await respuesta.json();

    let html = `

    <h2>Administración de Asesores</h2>

    <div style="
        background:white;
        padding:20px;
        border-radius:15px;
        margin-bottom:20px;
    ">

        <h3>Nuevo Asesor</h3>

        <input
        id="nuevoUsuario"
        placeholder="Usuario">

        <input
        id="nuevoPassword"
        placeholder="Contraseña">

        <input
        id="nuevoNombre"
        placeholder="Nombre">

        <button
        onclick="crearAsesor()">

            Guardar Asesor

        </button>

    </div>

    <table class="tabla">

        <tr>

            <th>Usuario</th>

            <th>Nombre</th>

            <th>Estado</th>

            <th style="text-align:center;">
    Acciones
</th>

        </tr>

    `;

    asesores.forEach(a=>{

        html += `

        <tr>

            <td>${a.usuario}</td>

            <td>${a.nombre}</td>

            <td>${a.estado}</td>

            <td style="text-align:center;">

<div style="
display:flex;
justify-content:center;
align-items:center;
gap:10px;
">

    <button
    style="
    width:auto;
    padding:10px 18px;
    margin:0;
    "
    onclick="
    cambiarEstadoAsesor(
    '${a.usuario}'
    )">

    ${a.estado==="ACTIVO"
    ? "Desactivar"
    : "Activar"}

    </button>

    <button
    style="
    width:auto;
    padding:10px 18px;
    margin:0;
    "
    onclick="
    verPasswordAsesor(
    '${a.usuario}'
    )">

    Contraseña

    </button>

    <button
    style="
    width:auto;
    padding:10px 18px;
    margin:0;
    "
    onclick="
    cambiarPasswordAsesor(
    '${a.usuario}'
    )">

    Cambiar Clave

    </button>

<button
style="
width:auto;
padding:10px 18px;
margin:0;
background:#dc2626;
"
onclick="
eliminarAsesor(
'${a.usuario}'
)">

Eliminar

</button>
</div>

</td>

        </tr>

        `;

    });

    html += `
    </table>
    `;

    document
    .getElementById(
    "contenedorAsesores"
    )
    .innerHTML = html;

}
async function crearAsesor(){

    const usuario =
    document
    .getElementById(
    "nuevoUsuario"
    )
    .value;

    const password =
    document
    .getElementById(
    "nuevoPassword"
    )
    .value;

    const nombre =
    document
    .getElementById(
    "nuevoNombre"
    )
    .value;

    const respuesta =
    await fetch(
    "https://script.google.com/macros/s/AKfycbzju385U93y9LzS-yStDOsO9i2vo97oAS-VaKRkMsV3giDUud34jAB5pbwvDior0tbN/exec",
    {
        method:"POST",

        body:JSON.stringify({

            action:"crearAsesor",

            usuario:usuario,

            password:password,

            nombre:nombre

        })

    });

    const resultado =
    await respuesta.json();

    if(resultado.ok){

    alert(
    "Asesor creado correctamente"
    );

    cargarAsesores();

}
else{

    alert(
    resultado.mensaje
    );

function formatearFecha(fecha){

    const f =
    new Date(fecha);

    return f.toLocaleString(
    "es-PE",
    {

        day:"2-digit",
        month:"2-digit",
        year:"numeric",

        hour:"2-digit",
        minute:"2-digit",

        hour12:true

    }

    );

}
async function cargarConsultas(){

    const rol =
    localStorage.getItem(
    "rol"
    );

    if(rol !== "ADMIN"){
        return;
    }

    document
    .getElementById("contenedorLotes")
    .style.display = "none";

    document
    .getElementById("contenedorAuditoria")
    .style.display = "none";

    document
    .getElementById("contenedorAsesores")
    .style.display = "none";

    document
    .getElementById("dashboard")
    .style.display = "none";

    document
    .getElementById("herramientas")
    .style.display = "none";

    document
    .getElementById("contenedorConsultas")
    .style.display = "block";

    const respuesta =
    await fetch(
    "https://script.google.com/macros/s/AKfycbzju385U93y9LzS-yStDOsO9i2vo97oAS-VaKRkMsV3giDUud34jAB5pbwvDior0tbN/exec?action=consultas"
    );

    const datos =
    await respuesta.json();

    // Más recientes primero
    datos.sort((a,b)=>{

        return new Date(b.Fecha)
        -
        new Date(a.Fecha);

    });

    let html = `

    <h2>Consultas Recibidas</h2>

    <div style="
    background:#fff;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
    ">

    <h3>
    🔔 Últimas Consultas
    </h3>

    `;

    datos
    .slice(0,5)
    .forEach(c=>{

        html += `

<div style="
padding:10px 0;
border-bottom:1px solid #eee;
">

    <b>${c.Nombre || "Sin nombre"}</b>

    <br>

    📍 ${c.Lote || "Sin lote"}

    <br>

    📞 ${c.Telefono || ""}

    <br>

    <small>
    ${formatearFecha(c.Fecha)}
    </small>

</div>

`;

    });

    html += `

    </div>

    <table class="tabla">

        <tr>

            <th>Fecha</th>
            <th>Lote</th>
            <th>Estado</th>
            <th>Nombre</th>
            <th>Email</th>
            <th>Teléfono</th>
            <th>Mensaje</th>

        </tr>

    `;

    datos.forEach(c=>{

        html += `

        <tr>

            <td>${formatearFecha(c.Fecha)}</td>
            <td>${c.Lote || ""}</td>
            <td>${c.Estado || ""}</td>
            <td>${c.Nombre || ""}</td>
            <td>${c.Email || ""}</td>
            <td>${c.Telefono || ""}</td>
            <td>${c.Mensaje || ""}</td>

        </tr>

        `;

    });

    html += `
    </table>
    `;

    document
.getElementById(
"contenedorConsultas"
)
.innerHTML =
html;

localStorage.setItem(
"consultasVistas",
Date.now()
);

document
.getElementById(
"badgeConsultas"
)
.style.display =
"none";

}
